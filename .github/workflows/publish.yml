name: Publish SmartEDA to PyPI

on:
release:
types: [published]

permissions:
contents: read
id-token: write

jobs:
test:
runs-on: ubuntu-latest

```
strategy:
  matrix:
    python-version: ["3.11", "3.12"]

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: ${{ matrix.python-version }}

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -e ".[dev]"

  - name: Run Tests
    run: pytest

  - name: Run Ruff
    run: ruff check src tests

  - name: Run Black Check
    run: black --check src tests

  - name: Run MyPy
    run: mypy src/smarteda
```

publish:
needs: test
runs-on: ubuntu-latest

```
permissions:
  contents: read
  id-token: write

environment:
  name: pypi

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Build Tools
    run: |
      python -m pip install --upgrade pip
      pip install build

  - name: Build Package
    run: python -m build

  - name: Publish to PyPI
    uses: pypa/gh-action-pypi-publish@release/v1
```
